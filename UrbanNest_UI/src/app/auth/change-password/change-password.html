<div class = "change-password-page">
<div class="change-password-container">
  <h2>Change Password</h2>

  <!-- Global Error/Success Messages -->
  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
    {{ errorMessage }}
  </div>
  <div *ngIf="message" class="alert alert-success alert-dismissible fade show" role="alert">
    {{ message }}
  </div>

  <form (ngSubmit)="submit()">
    <div class="form-group">
      <label for="oldPassword">Current Password <span class="text-danger">*</span></label>
      <input
        id="oldPassword"
        type="password"
        class="form-control"
        [class.is-invalid]="fieldErrors.oldPassword"
        [(ngModel)]="oldPassword"
        name="oldPassword"
        placeholder="Enter current password"
      />
      <small class="text-danger" *ngIf="fieldErrors.oldPassword">
        {{ fieldErrors.oldPassword }}
      </small>
    </div>

    <div class="form-group">
      <label for="newPassword">New Password <span class="text-danger">*</span></label>
      <input
        id="newPassword"
        type="password"
        class="form-control"
        [class.is-invalid]="fieldErrors.newPassword"
        [(ngModel)]="newPassword"
        name="newPassword"
        placeholder="Enter new password (min 8 characters)"
      />
      <small class="text-danger" *ngIf="fieldErrors.newPassword">
        {{ fieldErrors.newPassword }}
      </small>
      <small class="text-muted d-block mt-2">
        Must contain: uppercase, lowercase, and digits
      </small>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm New Password <span class="text-danger">*</span></label>
      <input
        id="confirmPassword"
        type="password"
        class="form-control"
        [class.is-invalid]="fieldErrors.confirmPassword"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        placeholder="Confirm new password"
      />
      <small class="text-danger" *ngIf="fieldErrors.confirmPassword">
        {{ fieldErrors.confirmPassword }}
      </small>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">
        Save Password
      </button>
      <button class="btn btn-secondary" type="button" (click)="cancel()">
        Cancel
      </button>
    </div>
  </form>
</div>
</div>
