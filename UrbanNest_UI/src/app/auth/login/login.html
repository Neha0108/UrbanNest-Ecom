<div class="page-shell auth-hero">
  <div class="auth-card login-card glass-card animated-entry">

    <header class="section-header">
      <p class="eyebrow">Welcome back</p>
      <h1 class="section-title">Sign in to Urban Nest</h1>
      <p class="body-copy">
        Access your curated wardrobe, favorites, and order history in a calm, premium space.
      </p>
    </header>

    <form [formGroup]="loginForm" (ngSubmit)="submit()">

      <!-- Email -->
      <div class="mb-3 text-start">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          placeholder="Enter your email"
          formControlName="UserEmail"
        />

        <small
          class="text-danger"
          *ngIf="loginForm.get('UserEmail')?.touched && loginForm.get('UserEmail')?.invalid"
        >
          Please enter a valid email
        </small>
      </div>

      <!-- Password -->
      <div class="mb-4 text-start">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          placeholder="Enter your password"
          formControlName="UserPassword"
        />

        <small
          class="text-danger"
          *ngIf="loginForm.get('UserPassword')?.touched && loginForm.get('UserPassword')?.invalid"
        >
          Password is required
        </small>
      </div>

      <!-- Login Button -->
      <button
        type="submit"
        class="btn btn-primary w-100 login-btn"
        [disabled]="loginForm.invalid"
      >
        Sign In
      </button>

    </form>

    <!-- Divider -->
    <div class="divider">
      <span>OR</span>
    </div>

    <!-- Google Button -->
    <div class="google-btn-wrap">
      <div id="googleButton"></div>
    </div>

    <!-- Error -->
    <p class="text-danger mt-3" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

    <!-- Register -->
    <p class="small-note">
      New here?
      <a routerLink="/register">Click here to register</a>
    </p>

  </div>
</div>
