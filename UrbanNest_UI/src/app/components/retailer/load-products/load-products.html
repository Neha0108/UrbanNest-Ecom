<div class="container mt-4">
  <h2 class="mb-3">My Products</h2>

  <div class="row g-4">
    <div class="col-lg-4 col-md-6" *ngFor="let item of products; trackBy: trackById">
      <div class="card h-100 shadow-sm product-card">
        <div class="card-body d-flex flex-column">
          <!-- Product Name -->
          <h5 class="card-title mt-2">
            {{item.productId }}. {{item.productName}}
          </h5>

          <!-- Category -->
          <span class="badge category-badge">
            {{ item.categoryName }}
          </span>
          <!-- Product Image -->
          <div *ngIf="item.imagepath" class="img-wrapper">
            <div id="carousel{{item.productId}}" class="carousel slide" data-bs-ride="carousel">
              <div class="carousel-inner">
                <div class="carousel-indicators">
                  <button *ngFor="let img of item.imagepath; let i = index" type="button"
                    [attr.data-bs-target]="'#carousel' + item.productId" [attr.data-bs-slide-to]="i"
                    [class.active]="i === 0"></button>
                </div>
                <div *ngFor="let img of item.imagepath; let i = index" class="carousel-item" [class.active]="i === 0">
                  <img [src]="'http://localhost:5146' + img" class="d-block w-100 product-img" />
                </div>
              </div>

              <!-- controls -->
              <button class="carousel-control-prev" type="button" [attr.data-bs-target]="'#carousel' + item.productId"
                data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
              </button>

              <button class="carousel-control-next" type="button" [attr.data-bs-target]="'#carousel' + item.productId"
                data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
              </button>
            </div>
          </div>
        </div>



        <!-- Description -->
        <p class="card-text product-desc">
          {{ item.productDescription }}
        </p>

        <!-- Price & Stock -->
        <p class="card-text mt-auto">
          <strong>Price:</strong> ₹ {{ item.productPrice }} <br />
          <span *ngIf="item.stock < 50" class="low-stock">Low Stock</span> <br/>
          <strong>Stock:</strong> {{ item.stock }}
        </p>

        <!-- Actions -->
        <div class="d-flex gap-2">
          <button class="btn btn-warning btn-sm edit-btn" (click)="editProduct(item.productId)">
            Edit
          </button>

          <button class="btn btn-danger btn-sm delete-btn" (click)="deleteProduct(item.productId)">
            Delete
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
